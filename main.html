<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lab 1 | Tom & Jerry + Mini Games</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <body>
  <h1 class="title">🎮 Welcome to GameNest</h1>

  <section class="card">
    <h2>Tom & Jerry Grid</h2>
    <p>Click <strong>Start</strong> to begin, then use arrow keys or buttons to catch Jerry.</p>

    <div class="controls">
      <button id="startBtn">Start</button>
      <span id="status">Press Start to play</span>
    </div>

    <div id="grid" class="grid"></div>

    <div class="controls">
      <button id="up">↑</button>
      <button id="left">←</button>
      <button id="down">↓</button>
      <button id="right">→</button>
    </div>
  </section>

  <section class="card">
    <h2>Rock Paper Scissors</h2>
    <p>Enter your move when prompted.</p>
    <div class="controls">
      <button id="btn_chakka">Play</button>
      <span>Score: <span class="score">0</span></span>
    </div>
  </section>

  <section class="card">
    <h2>To-Do List</h2>
    <p>Add tasks and track progress.</p>

    <div class="todo">
      <input id="add" placeholder="Write a task..." />
      <button class="task_btn">Add</button>
    </div>

    <div class="aaj_ke_kaam"></div>
  </section>
</body>
</html>
